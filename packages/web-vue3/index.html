<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  
  <!-- 1. 视口：宽度等于设备宽度，初始缩放 1:1，禁止用户手动缩放 -->
  <meta name="viewport" 
        content="width=device-width, 
                 initial-scale=1.0, 
                 maximum-scale=1.0, 
                 minimum-scale=1.0, 
                 user-scalable=no, 
                 viewport-fit=cover" />

  <!-- 2. 忽略自动识别电话号码和邮箱地址 -->
  <meta name="format-detection" content="telephone=no, email=no" />

  <!-- 3. 设置网页在 iOS Safari 上的显示模式（全屏、状态栏样式） -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- 4. 强制使用 WebKit 内核（避免 360 浏览器用 IE 内核） -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

  <!-- 5. 页面标题 -->
  <title>吃啥饭</title>

  <!-- 其他 SEO / 社交分享 meta 可后续添加 -->
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
